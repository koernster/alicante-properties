<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicante Property Search — 3 April 2026</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --fav: #f59e0b;
    --fav-light: #fef3c7;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --green: #059669;
    --red: #dc2626;
    --tag-new: #dcfce7;
    --tag-new-text: #166534;
    --tag-drop: #fee2e2;
    --tag-drop-text: #991b1b;
    --tag-excl: #f3e8ff;
    --tag-excl-text: #6b21a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

  header { background: white; border-bottom: 1px solid var(--border); padding: 20px 32px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { color: var(--muted); font-size: 14px; margin-top: 2px; }

  .toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; padding: 16px 32px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 68px; z-index: 99; }
  .toolbar .filter-group { display: flex; gap: 6px; align-items: center; }
  .toolbar label { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .toolbar select, .toolbar input { padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; }
  .toolbar input[type="text"] { width: 180px; }

  .view-toggle { display: flex; gap: 4px; margin-left: auto; }
  .view-toggle button { padding: 7px 16px; border: 1px solid var(--border); background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.2s; }
  .view-toggle button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .view-toggle button:hover:not(.active) { background: var(--accent-light); }

  main { padding: 24px 32px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .list { display: flex; flex-direction: column; gap: 12px; }

  .card-link { text-decoration: none; color: inherit; display: block; }
  .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: all 0.2s; cursor: pointer; }
  .card:hover { box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08); transform: translateY(-2px); }
  .card.list-view { display: flex; gap: 16px; padding: 12px; }
  .card.list-view .image-section { flex-shrink: 0; width: 120px; height: 120px; }
  .card.list-view .info-section { flex: 1; }

  .image-section { position: relative; width: 100%; height: 200px; background: #f0f0f0; overflow: hidden; }
  .image-section img { width: 100%; height: 100%; object-fit: cover; }

  .fav-btn { position: absolute; top: 8px; right: 8px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255, 255, 255, 0.95); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1); }
  .fav-btn:hover { transform: scale(1.1); }
  .fav-btn.favorited { color: var(--fav); }

  .tags { position: absolute; bottom: 8px; left: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
  .tag.new { background: var(--tag-new); color: var(--tag-new-text); }
  .tag.price-drop { background: var(--tag-drop); color: var(--tag-drop-text); }
  .tag.exclusive { background: var(--tag-excl); color: var(--tag-excl-text); }

  .info-section { padding: 16px; }
  .list-view .info-section { padding: 0; }

  .address { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .list-view .address { font-size: 15px; }

  .meta { display: flex; gap: 16px; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .list-view .meta { margin-bottom: 8px; }

  .price { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .list-view .price { font-size: 16px; }

  .previous-price { font-size: 12px; color: var(--red); text-decoration: line-through; }

  .description { font-size: 13px; color: var(--muted); line-height: 1.4; }
  .list-view .description { display: none; }

  .portal-badge { font-size: 11px; color: var(--muted); margin-top: 8px; }

  .no-results { text-align: center; padding: 48px 32px; color: var(--muted); }
  .no-results h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
</style>

    </select>
  </div>
  <div class="filter-group">
    <label for="search">Search:</label>
    <input type="text" id="search" placeholder="Location, area...">
  </div>
  <div class="view-toggle">
    <button class="active" data-view="grid">Grid</button>
    <button data-view="list">List</button>

</div>

let currentView = 'grid';
let favorites = JSON.parse(localStorage.getItem('favorites') || '{}');

function renderProperties(filtered = properties) {
  const container = document.getElementById('properties-container');
  container.className = currentView === 'grid' ? 'grid' : 'list';
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results" style="grid-column: 1/-1"><h2>No properties found</h2><p>Try adjusting your filters</p></div>';
    return;
  }

  filtered.forEach(prop => {
    const link = document.createElement('a');
    link.className = 'card-link';
    link.href = prop.url || '#';
    link.target = '_blank';
    link.rel = 'noopener noreferrer';

    const card = document.createElement('div');
    card.className = `card ${currentView === 'list' ? 'list-view' : ''}`;

    const plotText = prop.plot_m2 ? ` · ${prop.plot_m2.toLocaleString()}m² plot` : '';
    card.innerHTML = `
      <div class="image-section">
        <img src="${prop.image}" alt="${prop.address}" loading="lazy">
        <button class="fav-btn ${favorites[prop.id] ? 'favorited' : ''}" data-id="${prop.id}">★</button>
        <div class="tags">
          ${prop.tags.map(tag => `<span class="tag ${tag === 'new' ? 'new' : tag === 'price-drop' ? 'price-drop' : 'exclusive'}">${tag === 'new' ? 'NEW' : tag === 'price-drop' ? 'PRICE DROP' : 'EXCLUSIVE'}</span>`).join('')}
        </div>
      </div>
      <div class="info-section">
        <div class="address">${prop.address}</div>
        <div class="meta">${prop.bedrooms} bed · ${prop.bathrooms} bath · ${prop.size_m2}m²${plotText}</div>
        <div class="price">€${prop.price.toLocaleString()}</div>
        ${prop.previous_price ? `<div class="previous-price">Was €${prop.previous_price.toLocaleString()}</div>` : ''}
        <div class="description">${prop.description}</div>
        <div class="portal-badge">${prop.portal}</div>
      </div>
    `;

    link.appendChild(card);
    container.appendChild(link);
  });

  document.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const id = btn.dataset.id;
      favorites[id] = !favorites[id];
      localStorage.setItem('favorites', JSON.stringify(favorites));
      btn.classList.toggle('favorited');
    });
  });
}

function applyFilters() {
  const bedrooms = document.getElementById('bedrooms').value;
  const priceMax = document.getElementById('price-max').value;
  const search = document.getElementById('search').value.toLowerCase();

  let filtered = properties.filter(p => {
    const bedroomMatch = !bedrooms || p.bedrooms >= parseInt(bedrooms);
    const priceMatch = !priceMax || p.price <= parseInt(priceMax);
    const searchMatch = !search || p.address.toLowerCase().includes(search) || p.description.toLowerCase().includes(search) || (p.portal && p.portal.toLowerCase().includes(search));
    return bedroomMatch && priceMatch && searchMatch;
  });

  renderProperties(filtered);
}

document.getElementById('bedrooms').addEventListener('change', applyFilters);
document.getElementById('price-max').addEventListener('change', applyFilters);
document.getElementById('search').addEventListener('input', applyFilters);

document.querySelectorAll('.view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    applyFilters();
  });
});

renderProperties();
</script>
