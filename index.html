<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicante Property Search — 3 April 2026</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --fav: #f59e0b;
    --fav-light: #fef3c7;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --green: #059669;
    --red: #dc2626;
    --tag-new: #dcfce7;
    --tag-new-text: #166534;
    --tag-drop: #fee2e2;
    --tag-drop-text: #991b1b;
    --tag-excl: #f3e8ff;
    --tag-excl-text: #6b21a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

  header { background: white; border-bottom: 1px solid var(--border); padding: 20px 32px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { color: var(--muted); font-size: 14px; margin-top: 2px; }

  .toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; padding: 16px 32px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 68px; z-index: 99; }
  .toolbar .filter-group { display: flex; gap: 6px; align-items: center; }
  .toolbar label { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .toolbar select, .toolbar input { padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; }
  .toolbar input[type="text"] { width: 180px; }

  .view-toggle { display: flex; gap: 4px; margin-left: auto; }
  .view-toggle button { padding: 7px 16px; border: 1px solid var(--border); background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .view-toggle button:first-child { border-radius: 8px 0 0 8px; }
  .view-toggle button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .view-toggle button:last-child { border-radius: 0 8px 8px 0; }

  .container { padding: 32px; max-width: 100%; margin: 0 auto; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .list-view { display: flex; flex-direction: column; gap: 16px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.15s; position: relative; }
  .card:hover { box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); border-color: var(--accent); }

  .card-image { width: 100%; height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); object-fit: cover; position: relative; }
  .card-image.list-view { height: 150px; }
  .card-tags { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .card-tag { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .card-tag.new { background: var(--tag-new); color: var(--tag-new-text); }
  .card-tag.drop { background: var(--tag-drop); color: var(--tag-drop-text); }
  .card-tag.excl { background: var(--tag-excl); color: var(--tag-excl-text); }

  .card-favorite { position: absolute; top: 12px; right: 12px; width: 40px; height: 40px; background: white; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
  .card-favorite:hover { transform: scale(1.05); }
  .card-favorite.active { color: var(--fav); background: var(--fav-light); }

  .card-content { padding: 16px; }
  .card-address { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .card-price { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  .card-details { display: flex; gap: 16px; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .card-detail { display: flex; align-items: center; gap: 4px; }
  .card-description { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 12px; }

  .list-view-card { display: flex; gap: 16px; }
  .list-view-card .card-image { width: 200px; height: 150px; flex-shrink: 0; border-radius: 8px; }
  .list-view-card .card-content { flex: 1; padding: 12px; }
  .list-view-card .card-details { flex-wrap: wrap; }

  .card-footer { display: flex; gap: 8px; }
  .card-button { padding: 8px 12px; border: 1px solid var(--border); background: white; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s; font-weight: 600; }
  .card-button:hover { background: var(--accent); color: white; border-color: var(--accent); }

  .empty-state { text-align: center; padding: 60px 32px; color: var(--muted); }
  .empty-state h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; align-items: flex-start; gap: 8px; }
    .toolbar .filter-group { flex-direction: column; width: 100%; }
    .toolbar select, .toolbar input { width: 100%; }
    .view-toggle { margin-left: 0; margin-top: 8px; width: 100%; }
    header { padding: 16px 20px; }
    .container { padding: 16px; }
  }
</style>
</head>

const favorites = new Set();
const viewToggle = document.querySelectorAll('.view-btn');
const priceFilter = document.getElementById('price-filter');
const bedroomsFilter = document.getElementById('bedrooms-filter');
const searchInput = document.getElementById('search');
const gridView = document.getElementById('grid');
const listView = document.getElementById('list');
const emptyState = document.getElementById('empty');

function getTagColor(tag) {
  const colors = { new: '#dcfce7', drop: '#fee2e2', excl: '#f3e8ff' };
  return colors[tag] || '#ffffff';
}

function getTagTextColor(tag) {
  const colors = { new: '#166534', drop: '#991b1b', excl: '#6b21a8' };
  return colors[tag] || '#000000';
}

function filterProperties() {
  const price = parseInt(priceFilter.value) || Infinity;
  const beds = parseInt(bedroomsFilter.value) || 0;
  const search = searchInput.value.toLowerCase();

  return properties.filter(p => {
    const priceNum = parseInt(p.price.replace(/[^0-9]/g, ''));
    const bedCondition = beds === 0 || (beds === 3 ? p.beds >= 3 : p.beds === beds);
    const searchCondition = p.address.toLowerCase().includes(search) || p.description.toLowerCase().includes(search);
    return priceNum <= price && bedCondition && searchCondition;
  });
}

function renderCards() {
  const filtered = filterProperties();
  gridView.innerHTML = '';
  listView.innerHTML = '';
  emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
  
  if (filtered.length === 0) return;

  const cards = filtered.map(p => `
    <div class="card" data-id="${p.id}">
      <img src="${p.image}" alt="${p.address}" class="card-image">
      <div class="card-tags">${p.tags.map(tag => `<span class="card-tag ${tag}">${tag}</span>`).join('')}</div>
      <button class="card-favorite ${favorites.has(p.id) ? 'active' : ''}" data-id="${p.id}">♡</button>
      <div class="card-content">
        <div class="card-address">${p.address}</div>
        <div class="card-price">${p.price}</div>
        <div class="card-details">
          <div class="card-detail">🛏️ ${p.beds}</div>
          <div class="card-detail">🛁 ${p.baths}</div>
          <div class="card-detail">📐 ${p.sqm}m²</div>
        </div>
        <div class="card-description">${p.description}</div>
        <div class="card-footer">
          <button class="card-button">View Details</button>
          <button class="card-button">Contact</button>
        </div>
      </div>
    </div>
  `).join('');

  gridView.innerHTML = cards;

  const listCards = filtered.map(p => `
    <div class="card list-view-card" data-id="${p.id}">
      <img src="${p.image}" alt="${p.address}" class="card-image">
      <div style="flex: 1;">
        <div style="position: relative;">
          <div class="card-tags">${p.tags.map(tag => `<span class="card-tag ${tag}">${tag}</span>`).join('')}</div>
          <button class="card-favorite ${favorites.has(p.id) ? 'active' : ''}" data-id="${p.id}">♡</button>
        </div>
        <div class="card-address">${p.address}</div>
        <div class="card-price">${p.price}</div>
        <div class="card-details">
          <div class="card-detail">🛏️ ${p.beds}</div>
          <div class="card-detail">🛁 ${p.baths}</div>
          <div class="card-detail">📐 ${p.sqm}m²</div>
        </div>
        <div class="card-description">${p.description}</div>
        <div class="card-footer">
          <button class="card-button">View Details</button>
          <button class="card-button">Contact</button>
        </div>
      </div>
    </div>
  `).join('');

  listView.innerHTML = listCards;

  document.querySelectorAll('.card-favorite').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = parseInt(btn.getAttribute('data-id'));
      if (favorites.has(id)) {
        favorites.delete(id);
        btn.classList.remove('active');
      } else {
        favorites.add(id);
        btn.classList.add('active');
      }
    });
  });
}

viewToggle.forEach(btn => {
  btn.addEventListener('click', () => {
    viewToggle.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.getAttribute('data-view');
    gridView.style.display = view === 'grid' ? '' : 'none';
    listView.style.display = view === 'list' ? '' : 'none';
  });
});

priceFilter.addEventListener('change', renderCards);
bedroomsFilter.addEventListener('change', renderCards);
searchInput.addEventListener('input', renderCards);

renderCards();
</script>
